services:
  - type: web
    name: big-daves-news-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Bind 0.0.0.0:$PORT so Render’s port scan succeeds (see https://render.com/docs/web-services#port-binding)
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: big-daves-news-db
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_REGION
        value: US
      # Talk to the News — hosted LLM (OpenRouter or OpenAI-compatible).
      # Set HOSTED_LLM_API_KEY in the Render dashboard; without it the feature
      # falls back to a local Ollama instance which is not available on Render.
      - key: HOSTED_LLM_API_KEY
        sync: false
      - key: HOSTED_LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: HOSTED_LLM_MODEL
        value: openai/gpt-4o-mini
      - key: HOSTED_LLM_TIMEOUT_SECONDS
        value: "30"

  - type: cron
    name: big-daves-news-daily-email
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Run every 15 minutes, send once/day inside the configured local window.
    schedule: "*/15 * * * *"
    startCommand: python -m app.cron_send_daily
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: big-daves-news-db
          property: connectionString
      - key: SCHEDULER_TIMEZONE
        value: America/Chicago
      - key: DAILY_SEND_HOUR_LOCAL
        value: "8"
      - key: DAILY_SEND_MINUTE_LOCAL
        value: "0"
      - key: DAILY_SEND_WINDOW_MINUTES
        value: "180"

  - type: cron
    name: big-daves-news-daily-push
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Run every 15 minutes, send once/day inside configured local window.
    schedule: "*/15 * * * *"
    startCommand: python -m app.cron_send_push_daily
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: big-daves-news-db
          property: connectionString
      - key: SCHEDULER_TIMEZONE
        value: America/Chicago
      - key: PUSH_SEND_HOUR_LOCAL
        value: "8"
      - key: PUSH_SEND_MINUTE_LOCAL
        value: "0"
      - key: PUSH_SEND_WINDOW_MINUTES
        value: "180"
      - key: FORCE_SEND_PUSH_NOW
        value: "false"
      - key: PUSH_ALERT_TITLE
        value: Big Daves News
      - key: PUSH_ALERT_BODY
        value: Your daily brief is ready. Open the app for the latest headlines.
      - key: REPORT_URL
        value: https://big-daves-news-web.onrender.com/
      - key: APNS_BUNDLE_ID
        value: com.bigdavesnews.app

  - type: cron
    name: big-daves-news-headline-refresh
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Refresh headline pipeline three times per day.
    schedule: "0 */8 * * *"
    startCommand: python -m app.cron_refresh_headlines
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: big-daves-news-db
          property: connectionString
      - key: HEADLINE_REFRESH_API_URL
        value: https://big-daves-news-web.onrender.com/api/facts

  - type: cron
    name: big-daves-news-daily-metrics
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Daily metrics digest email at 9:10 UTC.
    schedule: "10 9 * * *"
    startCommand: python -m app.cron_send_metrics_daily
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DATABASE_URL
        fromDatabase:
          name: big-daves-news-db
          property: connectionString
      - key: METRICS_BASE_URL
        value: https://big-daves-news-web.onrender.com
      - key: METRICS_ROLLUP_DAYS
        value: "14"
      - key: SCHEDULER_TIMEZONE
        value: America/Chicago
      # Required to actually send email (set in Render dashboard; sync: false = not in git).
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: METRICS_EMAIL_TO
        sync: false
      - key: ADMIN_TOKEN
        sync: false

databases:
  - name: big-daves-news-db
    plan: basic-256mb
