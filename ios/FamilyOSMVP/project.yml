name: FamilyOSMVP
options:
  bundleIdPrefix: com.familyos
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.familyos.mvp
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: LSL6634TAV
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  FamilyOSMVP:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.familyos.mvp
        # App icon set in Sources/Assets.xcassets/AppIcon.appiconset (used for device, simulator, TestFlight)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # App Groups must live in the plist and here so `xcodegen generate` keeps CODE_SIGN_ENTITLEMENTS + merged keys
    entitlements:
      path: Sources/FamilyOSMVP.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.familyos.mvp
    dependencies:
      - target: FamilyOSMVPShareExtension
        embed: true
    scheme:
      testTargets: []
  FamilyOSMVPShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.familyos.mvp.shareextension
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.familyos.mvp
